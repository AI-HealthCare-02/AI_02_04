name: Backend CI

on:
  push:
    branches: [develop, main]
    paths:
      - "backend/**"
  pull_request:
    branches: [develop, main]
    paths:
      - "backend/**"

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

  test:
    name: Test & Build
    runs-on: ubuntu-latest
    needs: check
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: pytest -v
        env:
          DATABASE_URL: sqlite:///./test.db
          SECRET_KEY: test-secret-key
          ALGORITHM: HS256

      - name: Docker build check
        run: docker build -t dangmagochi-backend:${{ github.sha }} .
