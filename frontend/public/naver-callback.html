<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>네이버 로그인 처리 중...</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f5f5f5;
      color: #333;
    }
    .msg { text-align: center; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #e0e0e0;
      border-top-color: #03C75A;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="msg">
    <div class="spinner"></div>
    <p>네이버 로그인 처리 중...</p>
  </div>
  <script>
    (function () {
      // URL 파라미터 파싱
      const params = new URLSearchParams(window.location.search);
      const code  = params.get('code');
      const state = params.get('state');
      const error = params.get('error');
      const errorDesc = params.get('error_description');

      if (error) {
        // 오류 발생 → 부모 창에 에러 전달
        window.opener?.postMessage(
          { type: 'NAVER_LOGIN', error: errorDesc || error },
          window.location.origin
        );
        window.close();
        return;
      }

      if (!code || !state) {
        window.opener?.postMessage(
          { type: 'NAVER_LOGIN', error: '인증 코드를 받지 못했습니다.' },
          window.location.origin
        );
        window.close();
        return;
      }

      // ── 실제 환경: 백엔드 서버에 code + state 를 전달해 액세스 토큰 및 사용자 정보를 받아옴
      // ── 여기서는 code 를 그대로 부모에 전달, 부모(앱)에서 백엔드 호출
      // (백엔드 연동이 완료되면 fetch('/api/auth/naver', ...) 형태로 교체)
      window.opener?.postMessage(
        {
          type: 'NAVER_LOGIN',
          code,
          state,
          // Mock 사용자 정보 — 백엔드 연동 전 임시 데이터
          userInfo: {
            id:        'naver_' + state.slice(0, 8),
            email:     '',
            name:      '네이버유저',
            gender:    'M',
            age:       '20-29',
            birthyear: '',
          },
        },
        window.location.origin
      );

      window.close();
    })();
  </script>
</body>
</html>
